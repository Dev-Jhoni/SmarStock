<!DOCTYPE html>
<html lang="pt-br">
  
  <head>
    <meta charset="utf-8">
    <title>Redefinir senha</title>
  </head>
  
  <body>
    
    <div class="container">
      <h1>Redefinir senha</h1>
      
      <form>
        
        <label for="senha">Nova senha</label>
        <input type="password" id="senha" placeholder="Digite sua nova senha">
        
        <label for="confirmar-senha">Confirmar senha</label>
        <input type="password" id="confirmar-senha" placeholder="Digite a senha novamente">
        
        <button type="button" onclick="window.location.href='senha_atualizada.html'">
  Salvar nova senha
</button>
        
      </form>
      
    </div>
    
  </body>
  
</html>
